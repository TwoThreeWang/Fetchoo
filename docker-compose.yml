services:
  fetchoo:
    build: .
    container_name: fetchoo
    ports:
      - "5000:5000"
    volumes:
      # SQLite 缓存持久化（容器重建不丢失）
      - ./data/cache:/app/data
    env_file:
      - .env
    environment:
      - TZ=Asia/Shanghai
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 1G
