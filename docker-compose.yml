services:
  fetchoo:
    build: .
    container_name: fetchoo
    command: ["./server", "-port=5000", "-cache-db=/app/data/fetch_cache.db", "-log-dir=/app/logs"]
    ports:
      - "5000:5000"
    volumes:
      # SQLite 缓存持久化（容器重建不丢失）
      - ./data/cache:/app/data
    env_file:
      - .env
    environment:
      - TZ=Asia/Shanghai
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 1G
