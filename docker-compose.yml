services:
  fetchoo-warp:
    image: caomingjun/warp:latest
    container_name: fetchoo-warp
    restart: always
    cap_add:
      - NET_ADMIN
    sysctls:
      - net.ipv6.conf.all.disable_ipv6=0
      - net.ipv4.conf.all.src_valid_mark=1
    device_cgroup_rules:
      - 'c 10:200 rwm'
    volumes:
      - ./warp-data:/var/lib/cloudflare-warp # 固化账号，防止重复注册触发风控
    environment:
      - WARP_SLEEP=2 # 容器启动时等待 WARP 守护进程初始化的时间（秒），低配 VPS 可以适当调大到 5
  
  fetchoo:
    build: .
    container_name: fetchoo
    command: ["./server", "-port=5000", "-db=/app/data/fetchoo.db", "-log-dir=/app/logs"]
    ports:
      - "5000:5000"
    volumes:
      # SQLite 缓存持久化（容器重建不丢失）
      - ./data/cache:/app/data
    env_file:
      - .env
    environment:
      - TZ=Asia/Shanghai
      - HTTP_PROXY=http://fetchoo-warp:1080
      - HTTPS_PROXY=http://fetchoo-warp:1080
      - ALL_PROXY=socks5://fetchoo-warp:1080
    restart: unless-stopped
    depends_on:
      - fetchoo-warp
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 1G
