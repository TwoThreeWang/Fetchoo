services:
  web-fetcher:
    build: .
    container_name: go-web-fetcher
    ports:
      - "5000:5000"
    volumes:
      # SQLite 缓存持久化（容器重建不丢失）
      - ./data/cache:/app/data
      # 日志输出到宿主机
      - ./data/logs:/app/logs
    environment:
      - TZ=Asia/Shanghai
      # 可选：强制启用/禁用浏览器
      # - BROWSER=true
      # - NO_BROWSER=false
      # 可选：代理地址
      # - PROXY=http://host.docker.internal:7890
    restart: unless-stopped
